name: Release

on:
  pull_request:
    types: [closed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (v*.*.*)'
        required: true

permissions:
  contents: write

jobs:
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && 
       github.event.pull_request.merged == true && 
       startsWith(github.event.pull_request.head.ref, 'release-please--')) ||
      github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Extract version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            TITLE="${{ github.event.pull_request.title }}"
            if [[ "$TITLE" =~ ([0-9]+\.[0-9]+\.[0-9]+) ]]; then
              echo "version=v${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
            else
              echo "Could not extract version" && exit 1
            fi
          fi

  build-release:
    name: Build & Package
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: "tar.gz"
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: "tar.gz"
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: "tar.gz"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: "zip"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Package binary (Unix Tarball)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../uncver-artifacts-${{ matrix.target }}.tar.gz uncver-artifacts
          cd -
      
      - name: Package binary (Windows Zip)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path "uncver-artifacts.exe" -DestinationPath "../../../uncver-artifacts-${{ matrix.target }}.zip"
          cd -

      # ========================================================================
      # EXTRA PACKAGING: .deb (Linux)
      # ========================================================================
      - name: Package .deb (Linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cargo install cargo-deb
          cargo deb --target ${{ matrix.target }} --no-build
          mv target/${{ matrix.target }}/debian/*.deb uncver-artifacts-${{ matrix.target }}.deb

      # ========================================================================
      # EXTRA PACKAGING: .dmg (macOS)
      # ========================================================================
      - name: Package .dmg (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install create-dmg
          mkdir -p dmg-root
          cp target/${{ matrix.target }}/release/uncver-artifacts dmg-root/
          create-dmg \
            --volname "uncver-artifacts-${{ matrix.target }}" \
            --window-pos 200 120 \
            --window-size 600 300 \
            --icon-size 100 \
            --icon "uncver-artifacts" 175 120 \
            --hide-extension "uncver-artifacts" \
            "uncver-artifacts-${{ matrix.target }}.dmg" \
            dmg-root/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uncver-artifacts-${{ matrix.target }}
          path: uncver-artifacts-${{ matrix.target }}.*

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.version }}
          files: uncver-artifacts-${{ matrix.target }}.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
