name: Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build Release Binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            suffix: ""
            archive: "tar.gz"
          - target: x86_64-apple-darwin
            os: macos-latest
            suffix: ""
            archive: "tar.gz"
          - target: aarch64-apple-darwin
            os: macos-latest
            suffix: ""
            archive: "tar.gz"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: ".exe"
            archive: "zip"
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}
    
    - name: Build release binary
      run: cargo build --release --target ${{ matrix.target }}
    
    - name: Package binary (Unix)
      if: matrix.os != 'windows-latest'
      shell: bash
      run: |
        cd target/${{ matrix.target }}/release
        tar czf ../../../uncver-artifacts-${{ matrix.target }}.tar.gz uncver-artifacts
        cd -
    
    - name: Package binary (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        cd target/${{ matrix.target }}/release
        Compress-Archive -Path "uncver-artifacts.exe" -DestinationPath "../../../uncver-artifacts-${{ matrix.target }}.zip"
        cd -
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: uncver-artifacts-${{ matrix.target }}
        path: uncver-artifacts-${{ matrix.target }}.${{ matrix.archive }}

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/v')
      with:
        files: uncver-artifacts-${{ matrix.target }}.${{ matrix.archive }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
