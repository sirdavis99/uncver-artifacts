name: Release

on:
  pull_request:
    types: [closed]
    branches: [main, master]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (v*.*.*)'
        required: true

permissions:
  contents: write

jobs:
  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && 
       github.event.pull_request.merged == true && 
       startsWith(github.event.pull_request.head.ref, 'release-please--')) ||
      github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Extract version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Try title first, then branch name
            TITLE="${{ github.event.pull_request.title }}"
            BRANCH="${{ github.event.pull_request.head.ref }}"
            if [[ "$TITLE" =~ ([0-9]+\.[0-9]+\.[0-9]+) ]]; then
              VERSION="v${BASH_REMATCH[1]}"
            elif [[ "$BRANCH" =~ ([0-9]+\.[0-9]+\.[0-9]+) ]]; then
              VERSION="v${BASH_REMATCH[1]}"
            else
              echo "Could not extract version from title or branch" && exit 1
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted Version: $VERSION"

  build-release:
    name: Build & Package
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: "tar.gz"
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: "tar.gz"
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: "tar.gz"
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: "zip"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Verify Version
        run: |
          echo "Resolved Version: ${{ needs.resolve-version.outputs.version }}"
          if [ -z "${{ needs.resolve-version.outputs.version }}" ]; then
            echo "Error: Resolved version is empty"
            exit 1
          fi
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      
      - name: Package binary (Unix Tarball)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../uncver-artifacts-${{ matrix.target }}.tar.gz uncver-artifacts
          cd -
      
      - name: Package binary (Windows Zip)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path "uncver-artifacts.exe" -DestinationPath "../../../uncver-artifacts-${{ matrix.target }}.zip"
          cd -

      # ========================================================================
      # EXTRA PACKAGING: .deb (Linux)
      # ========================================================================
      - name: Package .deb (Linux)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cargo install cargo-deb
          # Ensure binary is in the location cargo-deb looks for by default
          mkdir -p target/release
          cp target/${{ matrix.target }}/release/uncver-artifacts target/release/
          cargo deb --target ${{ matrix.target }} --no-build
          mv target/${{ matrix.target }}/debian/*.deb uncver-artifacts-${{ matrix.target }}.deb

      # ========================================================================
      # EXTRA PACKAGING: .dmg (macOS .app Bundle)
      # ========================================================================
      - name: Package .dmg (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          brew install create-dmg
          
          APP_NAME="Uncver Artifacts"
          BUNDLE_DIR="${APP_NAME}.app/Contents"
          mkdir -p "${BUNDLE_DIR}/MacOS"
          mkdir -p "${BUNDLE_DIR}/Resources"
          
          # Copy binary and metadata
          cp target/${{ matrix.target }}/release/uncver-artifacts "${BUNDLE_DIR}/MacOS/"
          cp Info.plist "${BUNDLE_DIR}/"
          
          # Create DMG with app-drop-link
          create-dmg \
            --volname "${APP_NAME}" \
            --window-pos 200 120 \
            --window-size 600 300 \
            --icon-size 100 \
            --icon "${APP_NAME}.app" 175 120 \
            --hide-extension "${APP_NAME}.app" \
            --app-drop-link 425 120 \
            "Uncver-Artifacts-${{ matrix.target }}.dmg" \
            "${APP_NAME}.app"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uncver-artifacts-${{ matrix.target }}
          path: uncver-artifacts-${{ matrix.target }}.*

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve-version.outputs.version }}
          files: uncver-artifacts-${{ matrix.target }}.*
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
